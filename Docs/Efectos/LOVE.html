<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te Amo - Partículas y Lluvia Multidioma</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #0a0a2a, #000000);
      font-family: 'Arial', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }
    
    .love-text {
      position: fixed;
      font-size: 24px;
      animation: rainDown linear infinite;
      pointer-events: none;
      text-shadow: 0 0 5px #fff, 0 0 10px #ff69b4, 0 0 15px #ff69b4;
      white-space: nowrap;
      font-weight: bold;
      z-index: 2;
      opacity: 0.9;
    }
    
    @keyframes rainDown {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 0.8;
      }
      100% {
        transform: translateY(100vh) rotate(20deg);
        opacity: 0;
      }
    }
    
    .instructions {
      position: fixed;
      bottom: 20px;
      color: white;
      text-align: center;
      width: 100%;
      font-size: 14px;
      z-index: 3;
      opacity: 0.7;
    }
    
    /* Responsive adjustments */
    @media (max-width: 768px) {
      .love-text {
        font-size: 18px;
      }
    }
    
    @media (max-width: 480px) {
      .love-text {
        font-size: 16px;
      }
      
      .instructions {
        font-size: 12px;
        bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="instructions">Te Amo en todos los idiomas ❤️</div>

  <script>
    // Configuración inicial
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let positions = [];
    const mainText = "TE AMO";
    
    // Lista de "Te Amo" en diferentes idiomas
    const lovePhrases = [
      "TE AMO", // Español
      "I LOVE YOU", // Inglés
      "JE T'AIME", // Francés
      "ICH LIEBE DICH", // Alemán
      "TI AMO", // Italiano
      "愛してる", // Japonés
      "사랑해", // Coreano
      "我爱你", // Chino
      "أحبك", // Árabe
      "EU TE AMO", // Portugués
      "Я ТЕБЯ ЛЮБЛЮ" // Ruso
    ];

    // Inicializar canvas
    function setupCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      // Regenerar el mapa de texto y partículas
      positions = createTextMap();
      initParticles();
    }

    // Crear mapa de texto para las partículas
    function createTextMap() {
      const offCanvas = document.createElement('canvas');
      const offCtx = offCanvas.getContext('2d');
      offCanvas.width = canvas.width;
      offCanvas.height = canvas.height;

      // Hacer el texto responsivo según el tamaño de la pantalla
      const fontSize = Math.max(Math.floor(canvas.width/10), 40);
      
      offCtx.fillStyle = '#fff';
      offCtx.font = `bold ${fontSize}px Arial`;
      offCtx.textAlign = 'center';
      offCtx.textBaseline = 'middle';
      offCtx.fillText(mainText, canvas.width/2, canvas.height/2);

      const imageData = offCtx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      const positions = [];
      // Ajustar el espaciado según el tamaño de la pantalla
      const spacing = Math.max(4, Math.floor(canvas.width / 200));
      
      for (let y = 0; y < canvas.height; y += spacing) {
        for (let x = 0; x < canvas.width; x += spacing) {
          const index = (y * canvas.width + x) * 4;
          if (data[index + 3] > 128) {
            positions.push({ x, y });
          }
        }
      }
      return positions;
    }

    // Clase de partícula para el efecto principal
    class Particle {
      constructor(x, y) {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.targetX = x;
        this.targetY = y;
        this.speed = 0;
        this.size = Math.random() * 2 + 1;
        this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
      }
      
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
      
      update() {
        // Suavizar el movimiento hacia la posición objetivo
        this.x += (this.targetX - this.x) * 0.05;
        this.y += (this.targetY - this.y) * 0.05;
        this.draw();
      }
    }

    // Inicializar partículas
    function initParticles() {
      particles = [];
      positions.forEach(pos => {
        particles.push(new Particle(pos.x, pos.y));
      });
    }

    // Animación de partículas
    function animateParticles() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(p => p.update());
      requestAnimationFrame(animateParticles);
    }

    // Crear texto de lluvia
    function createRaindrop() {
      const phrase = lovePhrases[Math.floor(Math.random() * lovePhrases.length)];
      const raindrop = document.createElement('div');
      raindrop.className = 'love-text';
      raindrop.textContent = phrase;
      raindrop.style.left = Math.random() * window.innerWidth + 'px';
      raindrop.style.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
      raindrop.style.animationDuration = (3 + Math.random() * 4) + 's';
      document.body.appendChild(raindrop);

      // Eliminar el elemento después de que termine la animación
      setTimeout(() => {
        if (raindrop.parentNode) {
          document.body.removeChild(raindrop);
        }
      }, 7000);
    }

    // Iniciar todo cuando la ventana se carga
    window.addEventListener('load', () => {
      setupCanvas();
      animateParticles();
      
      // Iniciar lluvia de textos
      setInterval(createRaindrop, 300);
      
      // Limpiar textos ocasionalmente para evitar acumulación
      setInterval(() => {
        const texts = document.querySelectorAll('.love-text');
        if (texts.length > 50) {
          for (let i = 0; i < 10; i++) {
            if (texts[i] && texts[i].parentNode) {
              texts[i].parentNode.removeChild(texts[i]);
            }
          }
        }
      }, 5000);
    });

    // Redimensionar cuando cambia el tamaño de la ventana
    window.addEventListener('resize', () => {
      setupCanvas();
    });
  </script>
</body>
</html>
