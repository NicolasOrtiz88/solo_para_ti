<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PARA EL AMOR DE MI VIDA 💖</title>
<style>
  :root{
    --bg1:#0d0b1f;
    --bg2:#1a0b2e;
    --accent:#ff4da6;
    --accent2:#ffd23f;
    --accent3:#7cf7ff;
    --text:#fff;
  }

  *{ box-sizing:border-box; }

  html,body{
    height:100%;
    margin:0;
    overflow:hidden;
    font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    background: radial-gradient(1200px 800px at 20% 10%, #1f1144 0%, var(--bg1) 40%, #0b0a15 100%);
    color:var(--text);
  }

  .gradient{
    position:fixed; inset:0;
    background:
      radial-gradient(1200px 600px at 80% 20%, rgba(255,77,166,0.25), transparent 60%),
      radial-gradient(800px 500px at 20% 80%, rgba(124,247,255,0.20), transparent 60%),
      linear-gradient(135deg, rgba(255,210,63,0.15), transparent 70%);
    filter:saturate(1.3);
    animation: pulse 12s ease-in-out infinite;
    z-index:-2;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1) }
    50%{ transform:scale(1.03) }
  }

  .stars{
    position:fixed; inset:0; pointer-events:none; z-index:-1;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.3) 50%, transparent 51%),
      radial-gradient(1.2px 1.2px at 80% 60%, rgba(255,255,255,.25) 50%, transparent 51%),
      radial-gradient(1.6px 1.6px at 60% 10%, rgba(255,255,255,.22) 50%, transparent 51%),
      radial-gradient(1.2px 1.2px at 30% 80%, rgba(255,255,255,.25) 50%, transparent 51%);
    background-repeat: no-repeat;
  }

  header{
    position:fixed; top:0; left:0; right:0;
    display:flex; align-items:center; gap:.75rem;
    padding: .75rem .9rem;
    backdrop-filter: blur(8px) saturate(1.2);
    background: linear-gradient(90deg, rgba(13,11,31,.55), rgba(13,11,31,.35));
    border-bottom:1px solid rgba(255,255,255,.08);
    z-index:10;
  }

  .title{
    margin:0; flex:1;
    font-weight:800;
    letter-spacing:.02em;
    line-height:1.15;
    font-size: clamp(1.05rem, 2.5vw, 1.35rem);
    display:flex; align-items:center; gap:.6rem;
  }

  .title .shine{
    background: linear-gradient(90deg, #fff, #ffd23f, #ff4da6, #7cf7ff, #fff);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip:text;
    color: transparent;
    animation: shine 8s linear infinite;
    text-shadow: 0 0 20px rgba(255,77,166,.15);
  }
  @keyframes shine{ from{ background-position:0% } to{ background-position:300% } }

  .controls{
    display:flex; align-items:center; gap:.5rem;
  }
  .btn{
    border:none;
    border-radius: 999px;
    padding:.55rem .9rem;
    font-weight:700;
    letter-spacing:.02em;
    cursor:pointer;
    background: linear-gradient(135deg, rgba(255,77,166,.95), rgba(255,210,63,.95));
    color:#1a0b2e;
    box-shadow: 0 8px 24px rgba(255,77,166,.35), inset 0 1px 0 rgba(255,255,255,.35);
    transition: transform .15s ease, filter .2s ease;
  }
  .btn:hover{ transform: translateY(-1px); filter:saturate(1.1) }
  .btn:active{ transform: translateY(0px) scale(.98) }

  .screen{
    position:fixed; inset:0; display:grid; place-items:center; padding: min(6vw, 48px);
  }

  .card{
    max-width: 1100px; width:100%;
    border-radius: 28px;
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    border: 1px solid rgba(255,255,255,.10);
    box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
    overflow:hidden;
    position:relative;
  }

  .hero{
    display:grid; gap:1rem;
    place-items:center;
    padding: clamp(28px, 6vw, 52px);
    text-align:center;
  }

  h1{
    margin:0;
    font-size: clamp(2.1rem, 5.8vw, 4.4rem);
    line-height:1.02;
    letter-spacing:.02em;
    font-weight:900;
    text-shadow:
      0 0 18px rgba(255,77,166,.35),
      0 0 36px rgba(124,247,255,.25);
  }

  .tagline{
    font-size: clamp(1rem, 2.4vw, 1.35rem);
    opacity:.95;
    max-width: 900px;
  }

  .ribbon{
    position:absolute; top:16px; right:-32px;
    transform: rotate(15deg);
    background: linear-gradient(90deg, #ff4da6, #ffd23f, #7cf7ff);
    color:#1a0b2e;
    padding:.35rem 1.25rem;
    font-weight:900;
    border-radius:999px;
    box-shadow:0 8px 24px rgba(255,210,63,.35);
    font-size:.9rem;
    letter-spacing:.06em;
  }

  .rain-layer{
    position:fixed; inset:0;
    pointer-events:none;
  }

  .drop{
    position:absolute; top:-10vh;
    will-change: transform, opacity;
    white-space:nowrap;
    user-select:none;
    text-shadow:
      0 6px 14px rgba(0,0,0,.35),
      0 0 22px rgba(255,255,255,.2);
    filter: drop-shadow(0 8px 16px rgba(255,77,166,.25));
    opacity:0;
    animation: fall linear forwards;
  }

  @keyframes fall{
    0%{ transform: translate3d(var(--x,0), -10vh, 0) rotate(var(--r,0deg)); opacity:0 }
    5%{ opacity:1 }
    95%{ opacity:1 }
    100%{ transform: translate3d(var(--x,0), 110vh, 0) rotate(calc(var(--r,0deg) + 45deg)); opacity:0 }
  }

  .float{
    position:fixed; inset:0; pointer-events:none; overflow:hidden;
  }
  .heart{
    position:absolute;
    font-size: 18px;
    opacity:.85;
    animation: floatUp linear forwards;
  }
  @keyframes floatUp{
    from{ transform: translateY(0) scale(1); opacity:.95 }
    to  { transform: translateY(-120vh) scale(1.2); opacity:0 }
  }
</style>
</head>
<body>
  <div class="gradient"></div>
  <div class="stars"></div>

  <header>
    <h2 class="title">💘 <span class="shine">PARA EL AMOR DE MI VIDA</span></h2>
    <div class="controls">
      <button class="btn" id="toggleRain">⛱️ Pausar lluvia</button>
      <button class="btn" id="burst">💋 Más besos</button>
      <button class="btn" id="fullscreen">⛶ Pantalla completa</button>
    </div>
  </header>

  <main class="screen">
    <section class="card">
      <span class="ribbon">100% Amor</span>
      <div class="hero">
        <h1>PARA EL AMOR DE MI VIDA</h1>
        <p class="tagline">
          Cada gotita es un beso, cada color un "te amo". <br>
          Deja que lluevan las frases bonitas… y que el cielo se pinte de amor.
        </p>
      </div>
    </section>
  </main>

  <div class="rain-layer" id="rain"></div>
  <div class="float" id="float"></div>

<script>
(() => {
  const rain = document.getElementById('rain');
  const floatLayer = document.getElementById('float');
  const toggleBtn = document.getElementById('toggleRain');
  const burstBtn = document.getElementById('burst');
  const fsBtn = document.getElementById('fullscreen');

  const phrases = [
    "Eres mi milagro 💫",
    "Te amo con el alma 💖",
    "Tu sonrisa es mi sol 🌞",
    "Mi lugar favorito: tus abrazos 🤗",
    "Contigo, todo es perfecto ✨",
    "Mi razón de sonreír 😊",
    "Eres mi sueño cumplido 🌙",
    "Tus ojitos, mi universo ✨",
    "Siempre contigo, mi amor ❤️",
    "Mi corazón late por ti 💓",
    "Besitos para ti 💋",
    "Mi princesa hermosa 👑",
    "Juntos, por siempre ♾️",
    "Tu risa me enamora 😍",
    "Eres mi todo 💞"
  ];

  const kisses = ["💋","😘","💞","💖","💘","💕","🌸","💐"];

  let raining = true;
  let rainTimer;
  let heartTimer;

  function rand(min, max){ return Math.random() * (max - min) + min; }

  function randomColor(){
    const palette = [
      "#ff4da6","#ffd23f","#7cf7ff","#baff6a","#ff8fa3","#a78bfa","#f472b6","#34d399"
    ];
    return palette[Math.floor(Math.random()*palette.length)];
  }

  function spawnDrop(customText){
    const el = document.createElement('span');
    el.className = 'drop';
    const content = customText || (Math.random() < 0.5 ? kisses[Math.floor(Math.random()*kisses.length)] : phrases[Math.floor(Math.random()*phrases.length)]);
    el.textContent = content;

    const x = rand(0, window.innerWidth);
    const drift = rand(-40, 40);
    const rot = rand(-20, 20);
    const dur = rand(6, 12);
    const size = rand(16, 36);

    el.style.left = x + 'px';
    el.style.setProperty('--x', drift + 'px');
    el.style.setProperty('--r', rot + 'deg');
    el.style.animationDuration = dur + 's';
    el.style.fontSize = size + 'px';
    el.style.color = randomColor();
    el.style.opacity = '0';

    rain.appendChild(el);
    requestAnimationFrame(() => el.style.opacity = '1');
    el.addEventListener('animationend', () => el.remove());
  }

  function startRain(){
    if(rainTimer) return;
    rainTimer = setInterval(() => {
      for(let i=0;i<3;i++) spawnDrop();
    }, 350);
  }

  function stopRain(){
    clearInterval(rainTimer);
    rainTimer = null;
  }

  function toggleRain(){
    raining = !raining;
    (raining ? startRain : stopRain)();
    toggleBtn.textContent = raining ? "⛱️ Pausar lluvia" : "🌧️ Reanudar lluvia";
  }

  function spawnHeartsBurst(x, y, amount=16){
    for(let i=0;i<amount;i++){
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = kisses[Math.floor(Math.random()*kisses.length)];
      const size = rand(16, 40);
      h.style.fontSize = size + 'px';
      h.style.left = (x + rand(-40,40)) + 'px';
      h.style.top = (y + rand(-10,10)) + 'px';
      h.style.animationDuration = rand(2.5, 5) + 's';
      h.style.color = randomColor();
      floatLayer.appendChild(h);
      h.addEventListener('animationend', () => h.remove());
    }
  }

  function startAmbientHearts(){
    if(heartTimer) return;
    heartTimer = setInterval(() => {
      const x = rand(0, window.innerWidth);
      const y = window.innerHeight + 20;
      spawnHeartsBurst(x, y, 3);
    }, 1000);
  }

  function stopAmbientHearts(){
    clearInterval(heartTimer);
    heartTimer = null;
  }

  toggleBtn.addEventListener('click', toggleRain);
  burstBtn.addEventListener('click', () => {
    const x = window.innerWidth/2;
    const y = window.innerHeight/2;
    spawnHeartsBurst(x, y, 24);
    for(let i=0;i<10;i++) spawnDrop("💋");
  });
  fsBtn.addEventListener('click', () => {
    const elem = document.documentElement;
    if (!document.fullscreenElement) {
      (elem.requestFullscreen && elem.requestFullscreen()) ||
      (elem.webkitRequestFullscreen && elem.webkitRequestFullscreen());
    } else {
      (document.exitFullscreen && document.exitFullscreen()) ||
      (document.webkitExitFullscreen && document.webkitExitFullscreen());
    }
  });

  window.addEventListener('click', (e) => {
    spawnHeartsBurst(e.clientX, e.clientY, 18);
    for(let i=0;i<6;i++) spawnDrop();
  }, {passive:true});
  window.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    spawnHeartsBurst(t.clientX, t.clientY, 18);
    for(let i=0;i<6;i++) spawnDrop();
  }, {passive:true});

  startRain();
  startAmbientHearts();

  document.addEventListener('visibilitychange', () => {
    if(document.hidden){ stopRain(); stopAmbientHearts(); }
    else if(raining){ startRain(); startAmbientHearts(); }
  });
})();
</script>
</body>
</html>
