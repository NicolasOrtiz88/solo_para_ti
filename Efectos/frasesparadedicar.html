<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Amor que rebota 💘</title>
<style>
  :root{
    --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
    --pink:#ff5ea8; --rose:#ff8ac9; --glow:#ffd1e8; --white:#ffffff;
    --soft:#ffffff22; --soft2:#ffffff11;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background: radial-gradient(1200px 800px at 10% 10%, #2a2455, transparent 60%),
                radial-gradient(900px 600px at 90% 20%, #3a2a6d, transparent 60%),
                linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
    overflow:hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji";
    color:var(--white);
  }
  /* Canvas del fondo (corazones, nubes, chispas) */
  #bg{position:fixed; inset:0; width:100vw; height:100vh; display:block; z-index:0}

  /* Frases rebotando */
  .phrase{
    position:fixed;
    left:0; top:0;
    padding:.45rem .8rem;
    border-radius:999px;
    background: linear-gradient(135deg, #ff4f9eaa, #ffa3d8aa);
    backdrop-filter: blur(3px) saturate(140%);
    box-shadow: 0 6px 20px #ff6fb680, 0 0 18px 6px #ff7fb533 inset;
    color:#fff;
    font-weight:700;
    letter-spacing:.2px;
    text-shadow: 0 2px 10px var(--glow), 0 0 2px #fff;
    white-space:nowrap;
    user-select:none;
    will-change: transform, left, top;
    transform: translateZ(0);
  }
  .phrase small{
    display:block; font-weight:600; opacity:.9; letter-spacing:.5px;
  }

  /* Decorativos: burbujas suaves al fondo */
  .orb{position:fixed; filter: blur(40px); opacity:.2; z-index:0}
  .orb.one{width:340px;height:340px;background:#ff3b9d; left:-80px; bottom:-100px;}
  .orb.two{width:280px;height:280px;background:#8a4bff; right:-60px; top:-60px;}

  /* UI */
  .hud{position:fixed; left:12px; bottom:12px; z-index:3; display:flex; gap:.5rem; flex-wrap:wrap}
  .btn{border:none; border-radius:999px; padding:.6rem .95rem; font-weight:700; cursor:pointer; backdrop-filter: blur(6px);
       background:#ffffff22; color:#fff; box-shadow:0 4px 12px #0006; transition: transform .12s ease, background .2s}
  .btn:hover{transform:translateY(-2px); background:#ffffff33}
  .counter{font-size:.9rem; padding:.55rem .8rem; border-radius:999px; background:#ffffff1a; backdrop-filter:blur(6px)}

  /* Indicador táctil */
  .tap{position:fixed; inset:0; display:grid; place-items:center; pointer-events:none; z-index:2; animation: vanish 3s 3s forwards;}
  .tap span{background:#ffffff22; border:1px dashed #fff9; padding:.4rem .7rem; border-radius:999px; font-size:.9rem}
  @keyframes vanish{to{opacity:0}}

  /* Corazones que caen en CSS (suaves) */
  .heart{position:fixed; font-size:20px; opacity:.7; filter:drop-shadow(0 0 6px #ff83c7); animation: drift 12s linear infinite; z-index:1}
  @keyframes drift{
    from{transform:translateY(-10vh) translateX(0) rotate(0deg)}
    to{transform:translateY(110vh) translateX(40vw) rotate(360deg)}
  }
</style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <div class="tap"><span>💡 Toca o haz clic para explosiones románticas</span></div>

  <div class="hud">
    <button class="btn" id="add">+ Frases</button>
    <button class="btn" id="boom">💥 Explosión</button>
    <button class="btn" id="toggle">🌬️ Nubes</button>
    <div class="counter" id="count">0 frases</div>
  </div>

<script>
// ======= FRASES =======
const FRASES = [
  "Eres mi casualidad favorita",
  "Contigo todo es hoy",
  "Tu risa es mi canción",
  "Te quiero a la luna y volver",
  "Mi lugar favorito: tú",
  "Eres mi paz con brillo",
  "Amarte es mi superpoder",
  "Somos chispa y destino",
  "Me gustas, así, muchísimo",
  "Tus ojos: mi hogar",
  "Tú + Yo = Siempre",
  "Late fuerte cuando te veo",
  "Eres mi milagro cotidiano",
  "Amor que suma, no resta",
  "Mi café sabe a ti",
];

// ======= UTILS =======
const rand = (a,b)=>Math.random()*(b-a)+a;
const pick = arr => arr[(Math.random()*arr.length)|0];
const clamp=(v,min,max)=>v<min?min:v>max?max:v;

// ======= FRASES REBOTANDO (DOM + RAF) =======
const phrases=[];
const countEl = document.getElementById('count');

function createPhrase(text){
  const el=document.createElement('div');
  el.className='phrase';
  el.innerHTML = `💖 ${text}`;
  document.body.appendChild(el);
  const rect = el.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  const x = rand(0, innerWidth - w);
  const y = rand(0, innerHeight - h);
  const speed = rand(0.5, 1.6);
  const angle = rand(0, Math.PI*2);
  const vx = Math.cos(angle)*speed* (Math.random()>.5?1:-1) * 1.4;
  const vy = Math.sin(angle)*speed* (Math.random()>.5?1:-1) * 1.4;
  const spin = rand(-6,6);
  phrases.push({el,x,y,vx,vy,w,h,spin,rot:rand(-8,8)});
  countEl.textContent = `${phrases.length} frases`;
}

function addN(n=4){ for(let i=0;i<n;i++) createPhrase(pick(FRASES)); }
addN(8);

function tick(){
  const margin=6;
  for(const p of phrases){
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.spin*0.02;

    if(p.x <= margin){p.x=margin; p.vx*=-1}
    if(p.y <= margin){p.y=margin; p.vy*=-1}
    if(p.x + p.w >= innerWidth - margin){p.x = innerWidth - margin - p.w; p.vx*=-1}
    if(p.y + p.h >= innerHeight - margin){p.y = innerHeight - margin - p.h; p.vy*=-1}

    p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.rot}deg)`;
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

addEventListener('resize', ()=>{
  for(const p of phrases){
    p.x = clamp(p.x, 0, innerWidth - p.w);
    p.y = clamp(p.y, 0, innerHeight - p.h);
  }
});

// ======= CANVAS: CORAZONES, NUBES Y EXPLOSIONES =======
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
function fit(){ canvas.width = innerWidth; canvas.height = innerHeight; }
fit(); addEventListener('resize', fit);

let cloudsOn = true;

const particles=[];
function heartParticle(x,y,base=1){
  const size = rand(8,16)*base;
  const life = rand(60,120);
  const speed = rand(0.4,1.2);
  particles.push({
    type:'heart', x, y, vx:rand(-0.6,0.6), vy:-speed, life, ttl:life, size,
  });
}
function spark(x,y){
  particles.push({type:'spark', x, y, vx:rand(-3,3), vy:rand(-3,3), life:40, ttl:40, size:rand(1.5,3)});
}
function cloud(x,y){
  const r = rand(20,50);
  particles.push({type:'cloud', x, y, vx:rand(-0.15,0.15), vy:rand(-0.05,0.05), life:rand(160,300), ttl:rand(160,300), size:r});
}

function drawHeart(x,y,s){
  ctx.save();
  ctx.translate(x,y); ctx.scale(s/16,s/16);
  ctx.beginPath();
  ctx.moveTo(0,4);
  ctx.bezierCurveTo(0,-8,16,-8,16,4);
  ctx.bezierCurveTo(16,14,8,20,0,26);
  ctx.bezierCurveTo(-8,20,-16,14,-16,4);
  ctx.bezierCurveTo(-16,-8,0,-8,0,4);
  const g=ctx.createLinearGradient(-16,-8,16,26);
  g.addColorStop(0,'#ff9bd1'); g.addColorStop(1,'#ff3a9c');
  ctx.fillStyle=g; ctx.shadowColor='#ff93c7'; ctx.shadowBlur=18; ctx.fill();
  ctx.restore();
}

function drawCloud(x,y,r){
  ctx.save(); ctx.globalAlpha=.18; ctx.fillStyle='#ffffff'; ctx.shadowColor='#ffffff'; ctx.shadowBlur=40;
  for(let i=0;i<4;i++){
    const a = i* Math.PI/2; const cx = x + Math.cos(a)*r*0.6; const cy = y + Math.sin(a)*r*0.3;
    ctx.beginPath(); ctx.arc(cx,cy, r* (i===0?1:0.7), 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Emisor suave de corazones ascendentes
  if(Math.random()<0.5){ heartParticle(rand(0,canvas.width), canvas.height+20, rand(0.8,1.3)); }
  if(cloudsOn && Math.random()<0.02){ cloud(rand(0,canvas.width), rand(0,canvas.height*0.8)); }

  // Actualizar/dibujar partículas
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.ttl--;
    if(p.type==='heart'){ p.vy += -0.002; drawHeart(p.x,p.y,p.size); }
    else if(p.type==='spark'){ ctx.save(); ctx.globalAlpha=p.ttl/p.life; ctx.fillStyle='#ffd1e8'; ctx.shadowColor='#ff7fb5'; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); ctx.restore(); }
    else if(p.type==='cloud'){ drawCloud(p.x,p.y,p.size); }
    if(p.ttl<=0) particles.splice(i,1);
  }
  requestAnimationFrame(loop);
}
loop();

function burst(x,y,scale=1){
  for(let i=0;i<20*scale;i++) heartParticle(x+rand(-10,10), y+rand(-10,10), rand(1,1.8));
  for(let i=0;i<40*scale;i++) spark(x,y);
  if(cloudsOn) for(let i=0;i<2*scale;i++) cloud(x+rand(-20,20), y+rand(-10,10));
}

// Eventos
addEventListener('click', e=>{ burst(e.clientX, e.clientY, 1.2); });
addEventListener('touchstart', e=>{ const t=e.touches[0]; burst(t.clientX, t.clientY, 1.2); }, {passive:true});

// Botones
const btnAdd = document.getElementById('add');
const btnBoom = document.getElementById('boom');
const btnToggle = document.getElementById('toggle');
btnAdd.onclick=()=>addN(6);
btnBoom.onclick=()=>burst(rand(80, innerWidth-80), rand(80, innerHeight-120), 1.6);
btnToggle.onclick=()=>{ cloudsOn=!cloudsOn; btnToggle.textContent = cloudsOn? '🌬️ Nubes' : '☁️ Nubes OFF'; };

// Corazones en CSS que caen de vez en cuando
function cssHeart(){
  const h = document.createElement('div');
  h.className='heart'; h.textContent = pick(['❤','💗','💖','💘','💕']);
  h.style.left = rand(-10, 90)+ 'vw';
  h.style.animationDuration = rand(9,16)+'s';
  h.style.fontSize = rand(16,28)+'px';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(), 17000);
}
setInterval(cssHeart, 900);

</script>
</body>
</html>
