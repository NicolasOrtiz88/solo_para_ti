<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You - Animación de Partículas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #030008; /* Fondo oscuro profundo */
            overflow: hidden; /* Evitar scroll */
            width: 100vw;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        /* Texto sutil de interacción en la parte inferior */
        .instrucciones {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            pointer-events: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: parpadeo 2s infinite;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div class="instrucciones">Desliza el mouse o toca la pantalla</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles =[];
        let width, height;

        // Configuración de la animación
        let currentState = 'text'; // 'text' o 'heart'
        let lastStateChange = Date.now();
        const stateDuration = 6000; // Cambia cada 6 segundos

        // Interacción con mouse/táctil
        const mouse = { x: -1000, y: -1000, radius: 80 };

        // Paleta de colores románticos (Rosas, rojos, morados, dorados)
        const colors =['#ff3366', '#ff6699', '#ff99cc', '#ff0066', '#cc00ff', '#ffcc00'];

        // Clase Partícula
        class Particle {
            constructor(textX, textY, heartX, heartY) {
                // Aparecen de forma aleatoria en la pantalla al inicio
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                // Puntos de destino con una ligera variación para dar efecto de volumen (glow)
                this.textX = textX + (Math.random() - 0.5) * 4;
                this.textY = textY + (Math.random() - 0.5) * 4;
                this.heartX = heartX + (Math.random() - 0.5) * 4;
                this.heartY = heartY + (Math.random() - 0.5) * 4;
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.size = Math.random() * 2 + 0.5;
                
                this.vx = 0;
                this.vy = 0;
                // Valores de físicas tipo resorte (spring)
                this.ease = 0.02 + Math.random() * 0.04;
                this.friction = 0.88 + Math.random() * 0.04;
                
                this.targetX = this.textX;
                this.targetY = this.textY;
                this.randomPhase = Math.random() * Math.PI * 2;
            }

            setTarget(state) {
                if (state === 'text') {
                    this.targetX = this.textX;
                    this.targetY = this.textY;
                } else {
                    this.targetX = this.heartX;
                    this.targetY = this.heartY;
                }
            }

            update(isHeart) {
                let tx = this.targetX;
                let ty = this.targetY;

                // Si es un corazón, agregamos un efecto de latido genial
                if (isHeart) {
                    let time = Date.now() / 350;
                    // Fórmula para un latido de dos tiempos
                    let beat = Math.abs(Math.sin(time)) * Math.abs(Math.sin(time * 0.5));
                    let scale = 1 + beat * 0.12; // Aumenta hasta 12% en el latido

                    let cx = width / 2;
                    let cy = height / 2;
                    tx = cx + (this.heartX - cx) * scale;
                    ty = cy + (this.heartY - cy) * scale;
                }

                // Pequeño movimiento flotante constante
                tx += Math.sin(Date.now() * 0.002 + this.randomPhase) * 2;
                ty += Math.cos(Date.now() * 0.002 + this.randomPhase) * 2;

                let dx = tx - this.x;
                let dy = ty - this.y;

                // Interacción de repulsión con el mouse
                let distToMouse = Math.hypot(this.x - mouse.x, this.y - mouse.y);
                if (distToMouse < mouse.radius) {
                    let force = (mouse.radius - distToMouse) / mouse.radius;
                    let angle = Math.atan2(this.y - mouse.y, this.x - mouse.x);
                    this.vx -= Math.cos(angle) * force * 5;
                    this.vy -= Math.sin(angle) * force * 5;
                }

                // Físicas de acercamiento (spring)
                this.vx += dx * this.ease;
                this.vy += dy * this.ease;
                
                // Fricción
                this.vx *= this.friction;
                this.vy *= this.friction;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Obtener los píxeles que forman la palabra "I LOVE YOU"
        function getTextPoints() {
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
            offCanvas.width = width;
            offCanvas.height = height;

            offCtx.fillStyle = 'white';
            offCtx.textAlign = 'center';
            offCtx.textBaseline = 'middle';

            // Comprobar si es pantalla de móvil para apilar el texto
            if (width < 768) {
                const fontSize = Math.min(width / 3.5, 100);
                offCtx.font = `900 ${fontSize}px "Arial Black", sans-serif`;
                offCtx.fillText("I LOVE", width / 2, height / 2 - fontSize / 1.5);
                offCtx.fillText("YOU", width / 2, height / 2 + fontSize / 1.5);
            } else {
                const fontSize = Math.min(width / 7, 180);
                offCtx.font = `900 ${fontSize}px "Arial Black", sans-serif`;
                offCtx.fillText("I LOVE YOU", width / 2, height / 2);
            }

            return extractPoints(offCtx, offCanvas);
        }

        // Obtener los píxeles que forman un Corazón usando matemáticas
        function getHeartPoints() {
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
            offCanvas.width = width;
            offCanvas.height = height;

            // Escala del corazón adaptada a la pantalla
            let scale = Math.min(width, height) / 35;
            
            offCtx.translate(width / 2, height / 2);
            offCtx.beginPath();
            
            // Trazado de la ecuación paramétrica del corazón
            for (let t = 0; t <= Math.PI * 2; t += 0.05) {
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                offCtx.lineTo(x * scale, y * scale);
            }
            offCtx.fillStyle = 'white';
            offCtx.fill();

            return extractPoints(offCtx, offCanvas);
        }

        // Extraer posiciones X e Y de los píxeles blancos en el canvas temporal
        function extractPoints(context, c) {
            const data = context.getImageData(0, 0, c.width, c.height).data;
            const points =[];
            const step = 6; // Densidad de partículas. Menor = más partículas

            for (let y = 0; y < c.height; y += step) {
                for (let x = 0; x < c.width; x += step) {
                    const alpha = data[(y * c.width + x) * 4 + 3];
                    if (alpha > 128) { // Si el píxel es visible
                        points.push({ x, y });
                    }
                }
            }
            return points;
        }

        // Inicializar o redimensionar todo
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            let textPoints = getTextPoints();
            let heartPoints = getHeartPoints();

            // Para que no falten partículas, igualamos la cantidad a la figura más grande
            let maxLen = Math.max(textPoints.length, heartPoints.length);
            
            let newParticles =[];
            for (let i = 0; i < maxLen; i++) {
                let tp = textPoints[i % textPoints.length];
                let hp = heartPoints[i % heartPoints.length];

                // Si se hace resize, conservamos las partículas que ya existen para transición suave
                if (i < particles.length) {
                    let p = particles[i];
                    p.textX = tp.x;
                    p.textY = tp.y;
                    p.heartX = hp.x;
                    p.heartY = hp.y;
                    newParticles.push(p);
                } else {
                    newParticles.push(new Particle(tp.x, tp.y, hp.x, hp.y));
                }
            }
            particles = newParticles;
        }

        // Bucle de animación principal
        function animate() {
            requestAnimationFrame(animate);

            // Efecto de rastro fantasma (Ghosting/Trails)
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(3, 0, 8, 0.25)'; // Borra suavemente creando el trail
            ctx.fillRect(0, 0, width, height);

            // Efecto aditivo para colores muy brillantes "glowing"
            ctx.globalCompositeOperation = 'lighter';

            let now = Date.now();
            
            // Cambio de estado (Texto a Corazón y viceversa)
            if (now - lastStateChange > stateDuration) {
                currentState = currentState === 'text' ? 'heart' : 'text';
                lastStateChange = now;

                // "SE DESARMA": Explosión genial cuando cambia de estado
                particles.forEach(p => {
                    p.vx = (Math.random() - 0.5) * 45; // Empuje fuerte X
                    p.vy = (Math.random() - 0.5) * 45; // Empuje fuerte Y
                });
            }

            particles.forEach(p => {
                p.setTarget(currentState);
                p.update(currentState === 'heart');
                p.draw(ctx);
            });
        }

        // Eventos del Mouse
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        
        // Eventos Táctiles (Móviles)
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        // Limpiar interacción cuando salen de la pantalla
        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });
        window.addEventListener('touchend', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        // Responsividad
        window.addEventListener('resize', () => {
            // Evitar recalcular muy seguido al cambiar de tamaño
            clearTimeout(window.resizeTimeout);
            window.resizeTimeout = setTimeout(init, 200);
        });

        // Arrancar todo
        init();
        animate();

    </script>
</body>
</html>
